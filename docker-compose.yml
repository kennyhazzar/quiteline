services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pubsub
      POSTGRES_USER: pubsub
      POSTGRES_PASSWORD: pubsub
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pubsub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "6380:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "19000:9000"
      - "19001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  coturn:
    image: coturn/coturn:4
    command:
      - -n
      - --log-file=stdout
      - --listening-port=3478
      - --listening-ip=0.0.0.0
      - --relay-ip=0.0.0.0
      - --external-ip=${TURN_EXTERNAL_IP:-127.0.0.1}/0.0.0.0
      - --realm=${TURN_REALM:-localhost}
      - --server-name=${TURN_REALM:-localhost}
      - --fingerprint
      - --lt-cred-mech
      - --user=${TURN_USERNAME:-quietline}:${TURN_CREDENTIAL:-quietline-turn-secret}
      - --no-multicast-peers
      - --no-tls
      - --no-dtls
      - --min-port=49160
      - --max-port=49200
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"

  backend:
    build: .
    environment:
      HTTP_ADDR: ":8080"
      REDIS_ADDR: "redis:6379"
      NODE_ID: "backend-local"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      AUTH_ENABLED: "true"
      AUTH_SECRET: "local-compose-secret-change-me"
      AUTH_TOKEN_TTL: "${AUTH_TOKEN_TTL:-15m}"
      AUTH_REFRESH_TTL: "${AUTH_REFRESH_TTL:-2160h}"
      POSTGRES_DSN: "postgres://pubsub:pubsub@postgres:5432/pubsub?sslmode=disable"
      S3_ENDPOINT: "minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_BUCKET: "zk-messenger"
      S3_USE_SSL: "false"
      MAX_FILE_BYTES: "104861696"
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-mailto:admin@example.com}"
      TURN_URLS: "${TURN_URLS:-turn:localhost:3478?transport=udp,turn:localhost:3478?transport=tcp}"
      TURN_USERNAME: "${TURN_USERNAME:-quietline}"
      TURN_CREDENTIAL: "${TURN_CREDENTIAL:-quietline-turn-secret}"
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:18080
        NEXT_PUBLIC_WS_URL: ws://localhost:18080
    ports:
      - "3000:3000"
    depends_on:
      - backend
