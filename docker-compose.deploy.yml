services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --save '' --appendonly no --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio-data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  coturn:
    image: coturn/coturn:4
    restart: unless-stopped
    network_mode: host
    command:
      - -n
      - -v
      - --log-file=stdout
      - --listening-port=3478
      - --listening-ip=0.0.0.0
      - --relay-ip=${TURN_EXTERNAL_IP}
      - --external-ip=${TURN_EXTERNAL_IP}
      - --realm=${TURN_REALM}
      - --server-name=${TURN_REALM}
      - --fingerprint
      - --lt-cred-mech
      - --user=${TURN_USERNAME}:${TURN_CREDENTIAL}
      - --no-multicast-peers
      - --no-tls
      - --no-dtls
      - --min-port=49152
      - --max-port=65535

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      HTTP_ADDR: ":8080"
      NODE_ID: backend
      AUTH_ENABLED: ${AUTH_ENABLED}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TOKEN_TTL: ${AUTH_TOKEN_TTL:-15m}
      AUTH_REFRESH_TTL: ${AUTH_REFRESH_TTL:-2160h}
      API_KEYS: ${API_KEYS}
      POSTGRES_DSN: ${POSTGRES_DSN}
      BROKER: redis
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
      REDIS_CHANNEL_PREFIX: ${REDIS_CHANNEL_PREFIX}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_USE_SSL: "false"
      MAX_FILE_BYTES: ${MAX_FILE_BYTES}
      WS_CLIENT_BUFFER: ${WS_CLIENT_BUFFER}
      WS_MAX_MESSAGE_BYTES: ${WS_MAX_MESSAGE_BYTES}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      TURN_URLS: ${TURN_URLS}
      TURN_USERNAME: ${TURN_USERNAME}
      TURN_CREDENTIAL: ${TURN_CREDENTIAL}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    expose:
      - "3000"
    depends_on:
      - backend

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
      - backend

volumes:
  postgres-data:
  minio-data:
  caddy-data:
  caddy-config:
